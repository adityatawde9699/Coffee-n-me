<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 320 100"
  width="320"
  height="100"
  role="img"
  aria-label="Coffee'n me logo"
>
  <defs>
    <!-- Warm amber gradient for the cup -->
    <linearGradient id="cupGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C07A2A" />
      <stop offset="100%" stop-color="#7B4A14" />
    </linearGradient>
    <!-- Coffee liquid gradient -->
    <linearGradient id="coffeeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6B3A10" />
      <stop offset="100%" stop-color="#3D1F08" />
    </linearGradient>
    <!-- Steam gradient -->
    <linearGradient id="steamGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#C07A2A" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#E8C080" stop-opacity="0" />
    </linearGradient>
    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3D1F08" />
      <stop offset="60%" stop-color="#7B4A14" />
      <stop offset="100%" stop-color="#C07A2A" />
    </linearGradient>
    <!-- Subtle drop shadow filter -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#7B4A14" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- ─────────────────────────────────── -->
  <!-- Coffee Cup Icon                      -->
  <!-- ─────────────────────────────────── -->

  <!-- Steam wisps -->
  <g filter="url(#softShadow)">
    <!-- Left steam -->
    <path
      d="M 25 34 Q 21 28 25 22 Q 29 16 25 10"
      fill="none"
      stroke="url(#steamGrad)"
      stroke-width="2"
      stroke-linecap="round"
    />
    <!-- Center steam -->
    <path
      d="M 34 32 Q 30 25 34 18 Q 38 11 34 4"
      fill="none"
      stroke="url(#steamGrad)"
      stroke-width="2"
      stroke-linecap="round"
    />
    <!-- Right steam -->
    <path
      d="M 43 34 Q 39 27 43 20 Q 47 13 43 7"
      fill="none"
      stroke="url(#steamGrad)"
      stroke-width="2"
      stroke-linecap="round"
    />
  </g>

  <!-- Cup body -->
  <path
    d="M 14 40 L 17 72 Q 17.5 76 34 76 Q 50.5 76 51 72 L 54 40 Z"
    fill="url(#cupGrad)"
    filter="url(#softShadow)"
  />

  <!-- Coffee surface inside cup -->
  <ellipse cx="34" cy="41" rx="20" ry="4.5" fill="url(#coffeeGrad)" />

  <!-- Subtle coffee crema highlight -->
  <ellipse cx="30" cy="40.5" rx="8" ry="2" fill="#A0622A" opacity="0.5" />

  <!-- Cup handle -->
  <path
    d="M 51 50 Q 62 50 62 58 Q 62 66 51 66"
    fill="none"
    stroke="url(#cupGrad)"
    stroke-width="3.5"
    stroke-linecap="round"
  />

  <!-- Saucer -->
  <ellipse cx="34" cy="79" rx="26" ry="5" fill="#A0622A" filter="url(#softShadow)" />
  <ellipse cx="34" cy="78" rx="24" ry="4" fill="#C07A2A" />

  <!-- Saucer highlight -->
  <ellipse cx="28" cy="77.5" rx="9" ry="1.8" fill="#D4924A" opacity="0.5" />

  <!-- ─────────────────────────────────── -->
  <!-- Wordmark                             -->
  <!-- ─────────────────────────────────── -->

  <!-- "Coffee'n" primary text -->
  <text
    x="82"
    y="58"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="30"
    font-weight="700"
    letter-spacing="-0.5"
    fill="url(#textGrad)"
    filter="url(#softShadow)"
  >Coffee&#x2019;n</text>

  <!-- "me" secondary text — slightly offset, italic -->
  <text
    x="236"
    y="58"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="30"
    font-weight="400"
    font-style="italic"
    fill="#C07A2A"
    filter="url(#softShadow)"
  >me</text>

  <!-- Tagline -->
  <text
    x="82"
    y="74"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="9.5"
    font-style="italic"
    letter-spacing="1.2"
    fill="#A0622A"
    opacity="0.85"
  >words brewed slowly · ideas served warm</text>

  <!-- Decorative underline accent -->
  <line x1="82" y1="78" x2="305" y2="78" stroke="#C07A2A" stroke-width="0.75" opacity="0.4" />
</svg>
