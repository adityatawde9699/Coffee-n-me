<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img" aria-label="Coffee'n me logo">
  <defs>
    <linearGradient id="cup" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d99b54"/>
      <stop offset="100%" stop-color="#8a5418"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3d1f08"/>
      <stop offset="60%" stop-color="#7b4a14"/>
      <stop offset="100%" stop-color="#c07a2a"/>
    </linearGradient>
  </defs>

  <!-- cup mark (32-grid scaled 2x) -->
  <g transform="translate(8,8) scale(2)">
    <g fill="none" stroke="#c07a2a" stroke-width="1.2" stroke-linecap="round" opacity="0.6">
      <path d="M13 11 Q11.4 8.4 13 5.8"/>
      <path d="M17 11 Q15.4 7.8 17 5.2"/>
    </g>
    <ellipse cx="16" cy="25" rx="9.4" ry="1.6" fill="#a86a30"/>
    <path d="M7.6 13 L9.2 22 Q9.5 24 16 24 Q22.5 24 22.8 22 L24.4 13 Z" fill="url(#cup)"/>
    <ellipse cx="16" cy="13" rx="8.4" ry="1.7" fill="#3d1f08"/>
    <ellipse cx="13.5" cy="12.7" rx="3.2" ry="0.7" fill="#6b4222" opacity="0.7"/>
    <path d="M23 15.2 Q27.4 15.2 27.4 18.6 Q27.4 22 23 22" fill="none" stroke="url(#cup)" stroke-width="1.9" stroke-linecap="round"/>
  </g>

  <!-- wordmark -->
  <text x="84" y="46" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700" letter-spacing="-0.5" fill="url(#word)">Coffee&#x2019;n</text>
  <text x="186" y="46" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="400" font-style="italic" fill="#c07a2a">me</text>
  <text x="85" y="63" font-family="Georgia, 'Times New Roman', serif" font-size="9.5" font-style="italic" letter-spacing="1.1" fill="#a86a30" opacity="0.85">words brewed slowly · ideas served warm</text>
</svg>
