<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Coffee'n me">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a1b0e"/>
      <stop offset="100%" stop-color="#160f08"/>
    </linearGradient>
    <linearGradient id="cup" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d6a8"/>
      <stop offset="100%" stop-color="#cf9a5c"/>
    </linearGradient>
  </defs>

  <!-- espresso rounded-square backdrop -->
  <rect x="0" y="0" width="32" height="32" rx="7.5" fill="url(#bg)"/>

  <!-- steam -->
  <g fill="none" stroke="#e8c690" stroke-width="1.2" stroke-linecap="round" opacity="0.55">
    <path d="M13 11 Q11.4 8.4 13 5.8"/>
    <path d="M17 11 Q15.4 7.8 17 5.2"/>
  </g>

  <!-- saucer -->
  <ellipse cx="16" cy="25" rx="9.4" ry="1.6" fill="#a86a30"/>

  <!-- cup body -->
  <path d="M7.6 13 L9.2 22 Q9.5 24 16 24 Q22.5 24 22.8 22 L24.4 13 Z" fill="url(#cup)"/>
  <!-- coffee surface -->
  <ellipse cx="16" cy="13" rx="8.4" ry="1.7" fill="#4a2c12"/>
  <ellipse cx="13.5" cy="12.7" rx="3.2" ry="0.7" fill="#6b4222" opacity="0.7"/>
  <!-- handle -->
  <path d="M23 15.2 Q27.4 15.2 27.4 18.6 Q27.4 22 23 22" fill="none" stroke="url(#cup)" stroke-width="1.9" stroke-linecap="round"/>
</svg>
